name: regaudit-benchmark
description: AI compliance auditing environment with constrained file access and structured evaluation
version: 1.0.0

tasks:
  - id: task1_single_file
    description: Single-file GDPR audit
    file_budget: 3
    max_steps: 15

  - id: task2_django_app
    description: Multi-file Django audit (GDPR + OWASP)
    file_budget: 7
    max_steps: 30

  - id: task3_microservices
    description: Microservices audit with cross-file reasoning under constrained access and limited file reads.
    file_budget: 7
    max_steps: 50

actions:
  - read_file
  - search_codebase
  - flag_violation
  - propose_fix
  - finalize_audit

observations:
  - available_files
  - framework_rules
  - current_findings
  - file_reads_remaining
  - step_count

evaluation:
  metrics:
    - violation_detection
    - severity_accuracy
    - patch_quality

constraints:
  search:
    max_calls: 3
    returns: filename_only
    no_line_numbers: true
    ignores_comments: true
